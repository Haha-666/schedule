<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>排班表系統</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- ===== 左側設定面板 ===== -->
  <aside class="sidebar">
    <h1 class="logo">🗓 排班設定</h1>

    <!-- 店名 -->
    <section class="card">
      <h2>🏪 店名</h2>
      <input id="storeName" type="text" placeholder="輸入店名" class="store-input" oninput="renderStoreName()" />
    </section>

    <!-- 班別時間設定 -->
    <section class="card">
      <h2>⏰ 班別時間設定</h2>
      <div class="shift-time-grid">
        <span class="shift-dot morning"></span><label>早班</label>
        <input type="time" id="t-morning-start" value="07:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-morning-end" value="15:00" onchange="onShiftTimeChange()" />

        <span class="shift-dot afternoon"></span><label>中班</label>
        <input type="time" id="t-afternoon-start" value="15:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-afternoon-end" value="22:00" onchange="onShiftTimeChange()" />

        <span class="shift-dot evening"></span><label>晚班</label>
        <input type="time" id="t-evening-start" value="15:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-evening-end" value="22:00" onchange="onShiftTimeChange()" />

        <span class="shift-dot night"></span><label>大夜班</label>
        <input type="time" id="t-night-start" value="22:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-night-end" value="07:00" onchange="onShiftTimeChange()" />
      </div>
    </section>

    <!-- 人員管理 -->
    <section class="card">
      <h2>👤 人員名單</h2>
      <ul id="memberList" class="member-list"></ul>
      <div class="row">
        <input id="newName" type="text" placeholder="輸入姓名" maxlength="10" />
        <button onclick="addMember()">新增</button>
      </div>
      <div class="new-member-shifts">
        <span class="hint" style="display:block;margin-bottom:4px">固定上班班別（不選=任何班別皆可排）：</span>
        <label><input type="checkbox" class="new-member-shift" value="morning"> 早班</label>
        <label><input type="checkbox" class="new-member-shift" value="afternoon"> 中班</label>
        <label><input type="checkbox" class="new-member-shift" value="evening"> 晚班</label>
        <label><input type="checkbox" class="new-member-shift" value="night"> 大夜班</label>
      </div>
    </section>

    <!-- 每班需求人數 -->
    <section class="card">
      <h2>🔢 每班需求人數</h2>
      <div class="demand-grid">
        <label>早班</label>
        <input id="d-morning" type="number" min="0" value="2" class="demand-input" onchange="renderAll()" />
        <label>中班</label>
        <input id="d-afternoon" type="number" min="0" value="2" class="demand-input" onchange="renderAll()" />
        <label>晚班</label>
        <input id="d-evening" type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
        <label>大夜班</label>
        <input id="d-night" type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
      </div>
    </section>

    <!-- 休假日 -->
    <section class="card">
      <h2>🏖 休假設定</h2>
      <p class="hint">選取人員後點選日曆中的日期，即可設定該人員的休假日。</p>
      <div id="selectedMemberBadge" class="badge hidden"></div>
    </section>

    <!-- 產生按鈕 -->
    <button class="generate-btn" onclick="generateSchedule()">⚡ 自動產生班表</button>
    <button class="export-btn" onclick="exportCSV()">📥 匯出 CSV</button>
  </aside>

  <!-- ===== 右側主畫面 ===== -->
  <main class="main">
    <div class="topbar">
      <span id="storeNameDisplay" class="store-name-display"></span>
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <span id="monthLabel" class="month-label"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
      <button class="today-btn" onclick="goToday()">今天</button>
    </div>

    <div class="legend" id="legend"></div>

    <div class="cal-wrap">
      <div id="calendar" class="calendar"></div>
    </div>

    <div class="overview-wrap">
      <h2 class="overview-title">📋 本月班表總覽</h2>
      <div id="overviewTable" class="overview-scroll"></div>
      <div id="shortageBox" class="shortage-box"></div>
    </div>
  </main>
</div>

<!-- Cell detail modal -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.add('hidden')">關閉</button>
  </div>
</div>

<!-- Edit member fixed-shift modal -->
<div id="editMemberModal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal">
    <h3>設定「<span id="editMemberName"></span>」固定班別</h3>
    <input type="hidden" id="editMemberId" />
    <div id="editShiftChecks" class="edit-shift-checks"></div>
    <p class="hint" style="margin-top:8px">不勾選任何項目 = 任何班別皆可排。</p>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="close-btn" style="background:#f3f4f6" onclick="document.getElementById('editMemberModal').classList.add('hidden')">取消</button>
      <button class="close-btn" style="background:#4f7bf7;color:#fff" onclick="saveEditMember()">儲存</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
