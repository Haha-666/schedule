<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>排班表系統</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ===== 左側設定面板 ===== -->
    <aside class="sidebar">
      <h1 class="logo">🗓 排班設定</h1>

      <!-- 人員管理 -->
      <section class="card">
        <h2>👤 人員名單</h2>
        <ul id="memberList" class="member-list"></ul>
        <div class="row">
          <input id="newName" type="text" placeholder="輸入姓名" maxlength="10" />
          <button onclick="addMember()">新增</button>
        </div>
      </section>

      <!-- 每班需求人數 -->
      <section class="card">
        <h2>🔢 每班需求人數</h2>
        <div class="demand-grid">
          <label>早班</label>
          <input id="d-morning" type="number" min="0" value="2" class="demand-input" />
          <label>中班</label>
          <input id="d-afternoon" type="number" min="0" value="2" class="demand-input" />
          <label>晚班</label>
          <input id="d-evening" type="number" min="0" value="1" class="demand-input" />
          <label>大夜班</label>
          <input id="d-night" type="number" min="0" value="1" class="demand-input" />
        </div>
      </section>

      <!-- 休假日 -->
      <section class="card">
        <h2>🏖 休假設定</h2>
        <p class="hint">選取人員後點選日曆中的日期，即可設定該人員的休假日。</p>
        <div id="selectedMemberBadge" class="badge hidden"></div>
      </section>

      <!-- 產生按鈕 -->
      <button class="generate-btn" onclick="generateSchedule()">⚡ 自動產生班表</button>
      <button class="export-btn" onclick="exportCSV()">📥 匯出 CSV</button>
    </aside>

    <!-- ===== 右側主畫面 ===== -->
    <main class="main">
      <!-- 月份導覽 -->
      <div class="topbar">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <span id="monthLabel" class="month-label"></span>
        <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
        <button class="today-btn" onclick="goToday()">今天</button>
      </div>

      <!-- 班別圖例 -->
      <div class="legend">
        <span class="chip morning">早班 08:00–16:00</span>
        <span class="chip afternoon">中班 12:00–20:00</span>
        <span class="chip evening">晚班 16:00–00:00</span>
        <span class="chip night">大夜班 00:00–08:00</span>
        <span class="chip off">休假</span>
      </div>

      <!-- 日曆 -->
      <div class="cal-wrap">
        <div id="calendar" class="calendar"></div>
      </div>

      <!-- 班表總覽 -->
      <div class="overview-wrap">
        <h2 class="overview-title">📋 本月班表總覽</h2>
        <div id="overviewTable" class="overview-scroll"></div>
      </div>
    </main>
  </div>

  <!-- Cell detail modal -->
  <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.add('hidden')">關閉</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
