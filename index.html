<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>排班表系統</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f7bf7'/><rect x='6' y='10' width='20' height='16' rx='2' fill='white'/><rect x='6' y='10' width='20' height='5' rx='2' fill='%233563e9'/><line x1='11' y1='7' x2='11' y2='13' stroke='%23fff' stroke-width='2' stroke-linecap='round'/><line x1='21' y1='7' x2='21' y2='13' stroke='%23fff' stroke-width='2' stroke-linecap='round'/><rect x='9' y='19' width='4' height='3' rx='1' fill='%234f7bf7'/><rect x='14' y='19' width='4' height='3' rx='1' fill='%234f7bf7'/><rect x='19' y='19' width='4' height='3' rx='1' fill='%234f7bf7'/></svg>" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- ===== 左側設定面板 ===== -->
  <aside class="sidebar">
    <h1 class="logo">🗓 排班設定</h1>

    <!-- 班別時間設定 -->
    <section class="card">
      <h2>⏰ 班別時間設定</h2>
      <div class="shift-time-grid">
        <span class="shift-dot morning"></span><label>早班1</label>
        <input type="time" id="t-morning-start"  value="07:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-morning-end"    value="15:00" onchange="onShiftTimeChange()" />

        <span class="shift-dot morning2"></span><label>早班2</label>
        <input type="time" id="t-morning2-start" value="08:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-morning2-end"   value="16:00" onchange="onShiftTimeChange()" />

        <span class="shift-dot afternoon"></span><label>中班</label>
        <input type="time" id="t-afternoon-start" value="10:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-afternoon-end"   value="18:00" onchange="onShiftTimeChange()" />

        <span class="shift-dot evening"></span><label>晚班1</label>
        <input type="time" id="t-evening-start"  value="15:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-evening-end"    value="22:00" onchange="onShiftTimeChange()" />

        <span class="shift-dot evening2"></span><label>晚班2</label>
        <input type="time" id="t-evening2-start" value="16:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-evening2-end"   value="00:00" onchange="onShiftTimeChange()" />

        <span class="shift-dot night"></span><label>大夜班</label>
        <input type="time" id="t-night-start"    value="22:00" onchange="onShiftTimeChange()" />
        <span>–</span>
        <input type="time" id="t-night-end"      value="07:00" onchange="onShiftTimeChange()" />
      </div>
    </section>

    <!-- 人員管理 -->
    <section class="card">
      <h2>👤 人員名單</h2>
      <ul id="memberList" class="member-list"></ul>
      <div class="row">
        <input id="newName" type="text" placeholder="輸入姓名" maxlength="10" />
        <button onclick="addMember()">新增</button>
      </div>
      <div class="new-member-shifts">
        <span class="hint" style="display:block;margin-bottom:4px">固定上班班別（不選=任何班別皆可排）：</span>
        <label><input type="checkbox" class="new-member-shift" value="morning">  早班1</label>
        <label><input type="checkbox" class="new-member-shift" value="morning2"> 早班2</label>
        <label><input type="checkbox" class="new-member-shift" value="afternoon">中班</label>
        <label><input type="checkbox" class="new-member-shift" value="evening">  晚班1</label>
        <label><input type="checkbox" class="new-member-shift" value="evening2"> 晚班2</label>
        <label><input type="checkbox" class="new-member-shift" value="night">    大夜班</label>
      </div>
    </section>

    <!-- 每班需求人數 -->
    <section class="card">
      <h2>🔢 每班需求人數</h2>

      <div class="demand-subtitle">📅 平日</div>
      <div class="demand-grid">
        <label>早班1</label>  <input id="d-morning-wd"   type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
        <label>早班2</label>  <input id="d-morning2-wd"  type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
        <label>中班</label>   <input id="d-afternoon-wd" type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
        <label>晚班1</label>  <input id="d-evening-wd"   type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
        <label>晚班2</label>  <input id="d-evening2-wd"  type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
        <label>大夜班</label> <input id="d-night-wd"     type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
      </div>

      <div class="demand-subtitle">🏖️ 假日</div>
      <div class="demand-grid">
        <label>早班1</label>  <input id="d-morning-we"   type="number" min="0" value="2" class="demand-input" onchange="renderAll()" />
        <label>早班2</label>  <input id="d-morning2-we"  type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
        <label>中班</label>   <input id="d-afternoon-we" type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
        <label>晚班1</label>  <input id="d-evening-we"   type="number" min="0" value="2" class="demand-input" onchange="renderAll()" />
        <label>晚班2</label>  <input id="d-evening2-we"  type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
        <label>大夜班</label> <input id="d-night-we"     type="number" min="0" value="1" class="demand-input" onchange="renderAll()" />
      </div>
    </section>

    <!-- 休假日 -->
    <section class="card">
      <h2>🏖 休假設定</h2>
      <p class="hint">選取人員後點選日曆中的日期，即可設定該人員的休假日。</p>
      <div id="selectedMemberBadge" class="badge hidden"></div>
    </section>

    <!-- 產生 / 列印 -->
    <button class="generate-btn" onclick="generateSchedule()">⚡ 自動產生班表</button>
    <button class="export-btn"   onclick="printSchedule()">🖨️ 列印班表（A4）</button>
  </aside>

  <!-- ===== 右側主畫面 ===== -->
  <main class="main">
    <div class="topbar">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <span id="monthLabel" class="month-label"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
      <button class="today-btn" onclick="goToday()">今天</button>
    </div>

    <div class="legend" id="legend"></div>

    <div class="cal-wrap">
      <div id="calendar" class="calendar"></div>
    </div>

    <div class="overview-wrap" id="overviewSection">
      <h2 class="overview-title">📋 本月班表總覽</h2>
      <div id="overviewTable" class="overview-scroll"></div>
      <div id="shortageBox" class="shortage-box"></div>
    </div>
  </main>
</div>

<!-- Cell detail modal -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <button class="close-btn" onclick="document.getElementById('modalOverlay').classList.add('hidden')">關閉</button>
  </div>
</div>

<!-- Edit member fixed-shift modal -->
<div id="editMemberModal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal">
    <h3>設定「<span id="editMemberName"></span>」固定班別</h3>
    <input type="hidden" id="editMemberId" />
    <div id="editShiftChecks" class="edit-shift-checks"></div>
    <p class="hint" style="margin-top:8px">不勾選任何項目 = 任何班別皆可排。</p>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="close-btn" style="background:#f3f4f6" onclick="document.getElementById('editMemberModal').classList.add('hidden')">取消</button>
      <button class="close-btn" style="background:#4f7bf7;color:#fff" onclick="saveEditMember()">儲存</button>
    </div>
  </div>
</div>

<script src="scheduler.js"></script>
<script src="app.js"></script>
</body>
</html>
